version: 2
updates:
  - package-ecosystem: npm
    directory: /shift-hackathon.com
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      shift-hackathon:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
